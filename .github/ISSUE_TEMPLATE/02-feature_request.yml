name: ✨ 기능 요청
description: 새로운 기능이나 개선 사항을 제안할 때 사용하세요.
title: "[Feature] "
labels: ["enhancement"]
assignees:
  - Tessa1217

body:
  - type: markdown
    attributes:
      value: |
        좋은 아이디어를 제안해 주셔서 감사합니다! 구체적으로 작성해 주실수록 도움이 됩니다.

  - type: textarea
    id: problem
    attributes:
      label: 해결하고 싶은 문제
      description: 어떤 불편함이나 필요성이 있나요?
      placeholder: "예: 모바일에서 목차를 확인하기 불편합니다."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결 방법
      description: 어떤 기능이 추가되었으면 하나요?
      placeholder: 원하는 기능이나 동작 방식을 설명해 주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 다른 방법을 생각해 보셨나요? (선택 사항)

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고할 링크, 스크린샷, 예시 등이 있으면 첨부해 주세요.
